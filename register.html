<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Sign Up — Stress & Anxiety</title>
  <link rel="stylesheet" href="register.css">
</head>
<body>
  <main class="register-root">
    <section class="register-card" aria-labelledby="register-title">
      <button class="close-home" id="register-close" aria-label="Return to home">✕</button>
      <h1 id="register-title">Create an account</h1>
      <p class="register-sub">Join us to access tools for managing stress & anxiety.</p>

      <form id="register-form" novalidate>
        <label for="fullname">Full Name</label>
        <input id="fullname" name="fullname" type="text" required autocomplete="name" />

        <label for="email">Email</label>
        <input id="email" name="email" type="email" required inputmode="email" autocomplete="email" />

        <label for="password">Password</label>
        <div class="pw-row">
          <input id="password" name="password" type="password" required autocomplete="new-password" />
          <button type="button" id="pw-toggle" aria-label="Show password">👁</button>
        </div>
        <p class="pw-hint">Minimum 8 characters, including letters and numbers</p>

        <label for="confirm-password">Confirm Password</label>
        <div class="pw-row">
          <input id="confirm-password" name="confirm-password" type="password" required autocomplete="new-password" />
          <button type="button" id="pw-toggle-confirm" aria-label="Show password">👁</button>
        </div>

        <label class="terms">
          <input type="checkbox" id="terms" name="terms" required/>
          I agree to the <a href="#" class="link">Terms of Service</a> and <a href="#" class="link">Privacy Policy</a>
        </label>

        <button class="primary" type="submit">Create Account</button>
      </form>

      <p class="signin">Already have an account? <a href="LogIn.html">Sign in</a></p>
    </section>
  </main>

  <script src="register.js"></script>
</body>
</html>
